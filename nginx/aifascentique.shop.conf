# AIFA SCENTIQUE — aifascentique.shop (frontend + backend on one domain)
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled
#
# Routing:
#   /                              → Next.js (store + admin BFF) :3001
#   /health                        → Go API health check :8080
#   /api/store/payments/webhook    → Go API (Razorpay webhooks) :8080
# All other /api/* traffic is handled by Next.js BFF, which proxies to Go internally.

upstream aifa_web {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream aifa_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name aifascentique.shop www.aifascentique.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://aifascentique.shop$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aifascentique.shop;

    ssl_certificate     /etc/letsencrypt/live/aifascentique.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aifascentique.shop/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://aifascentique.shop$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aifascentique.shop;

    ssl_certificate     /etc/letsencrypt/live/aifascentique.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aifascentique.shop/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    location = /health {
        proxy_pass http://aifa_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/store/payments/webhook {
        proxy_pass http://aifa_api/api/store/payments/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://aifa_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
